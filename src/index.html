<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosAlert | Dashboard Executivo</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            padding: 30px; 
            background-color: #f8f9fa; 
            color: #333; 
            margin: 0;
        }
        
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        .header {
            margin-bottom: 30px;
        }

        .header h1 { margin: 0; color: #2c3e50; font-size: 28px; }
        .header p { margin: 5px 0 0 0; color: #A9ACC7; font-size: 15px; }

        /* Grid dos KPIs */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #BCC1D6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .kpi-card.alerta { border-left-color: #FFD919; }

        .kpi-titulo { color: #A9ACC7; font-size: 13px; text-transform: uppercase; font-weight: 600; margin-bottom: 10px; }
        .kpi-valor { color: #2c3e50; font-size: 32px; font-weight: 700; margin: 0; }

        /* Grid do Conteúdo (Gráfico e Tabela) */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .panel {
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .panel h2 { margin-top: 0; color: #2c3e50; font-size: 18px; border-bottom: 1px solid #eef0f5; padding-bottom: 15px; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eef0f5; font-size: 14px; }
        th { color: #A9ACC7; font-weight: 600; text-transform: uppercase; font-size: 12px; }
        
        .badge {
            padding: 5px 10px; border-radius: 15px; font-size: 11px; font-weight: 600;
        }
        .badge-normal { background-color: #f1f3f5; color: #A9ACC7; }
        .badge-alerta { background-color: #FFD919; color: #5c4d00; }
        .badge-critico { background-color: #ffebee; color: #c62828; }
        .tabela-container {
            max-height: 350px;
            overflow-y: auto;
            border-bottom: 1px solid #eef0f5;
        }
        /* Fixa o cabeçalho no topo quando rolar a tabela */
        th { 
            color: #A9ACC7; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 12px; 
            position: sticky;
            top: 0;
            background-color: #ffffff;
            z-index: 1;
            box-shadow: 0 2px 2px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>AtmosAlert</h1>
            <p>Visão Executiva de Anomalias Atmosféricas</p>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-titulo">Total Focos de Calor (Período)</div>
                <div class="kpi-valor" id="kpi-focos">--</div>
            </div>
            <div class="kpi-card alerta">
                <div class="kpi-titulo">Maior Anomalia (Score Z)</div>
                <div class="kpi-valor" id="kpi-zscore">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-titulo">Municípios em Alerta</div>
                <div class="kpi-valor" id="kpi-municipios">--</div>
            </div>
        </div>

        <div class="content-grid">
            <div class="panel">
                <h2>Focos de Calor por Município</h2>
                <canvas id="graficoFocos"></canvas>
            </div>

            <div class="panel">
                <h2>Últimos Registros</h2>
                <div class="tabela-container"> <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Município</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo">
                        <tr><td colspan="3">Carregando dados...</td></tr>
                    </tbody>
                </table>
            </div></div>
        </div>
    </div>

    <script>
        // 1. INSIRA SUAS CHAVES AQUI
        const SUPABASE_URL = 'https://mbzkvvwjkhknqykguqgt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iemt2dndqa2hrbnF5a2d1cWd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MzQzOTAsImV4cCI6MjA5NjAxMDM5MH0.WuRDU5f7itJfv5HgM7xm_gaecF5sprBazL6P57YmTA0';

        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let meuGrafico = null; // Variável para guardar o gráfico

        async function carregarDados() {
            try {
                const { data, error } = await clienteSupabase
                    .from('tb_atmosalert_analitico')
                    .select('*')
                    .order('Data', { ascending: false })
                    .limit(50);

                if (error) throw error;

                atualizarKPIs(data);
                renderizarGrafico(data);
                renderizarTabela(data);

            } catch (error) {
                console.error("Erro:", error);
            }
        }

        function atualizarKPIs(dados) {
            if (dados.length === 0) return;

            // Soma total de focos
            const totalFocos = dados.reduce((acc, linha) => acc + linha.Focos_Calor, 0);
            
            // Pega o maior Score Z
            const maxZScore = Math.max(...dados.map(l => l.Score_Z_Fumaca));
            
            // Conta municípios únicos que tiveram alerta (Z ou IQR)
            const municipiosAlerta = new Set(
                dados.filter(l => l.Alerta_Z || l.Alerta_IQR).map(l => l.Municipio)
            ).size;

            document.getElementById('kpi-focos').innerText = totalFocos;
            document.getElementById('kpi-zscore').innerText = maxZScore.toFixed(2);
            document.getElementById('kpi-municipios').innerText = municipiosAlerta;
        }

        function renderizarGrafico(dados) {
            // Prepara os dados para o gráfico (agrupa focos por município)
            const agrupado = {};
            dados.forEach(l => {
                if (!agrupado[l.Municipio]) agrupado[l.Municipio] = 0;
                agrupado[l.Municipio] += l.Focos_Calor;
            });

            // Pega apenas os 5 municípios com mais focos para o gráfico não ficar espremido
            const top5 = Object.entries(agrupado)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);

            const labels = top5.map(item => item[0]);
            const valores = top5.map(item => item[1]);

            const ctx = document.getElementById('graficoFocos').getContext('2d');
            
            if (meuGrafico) meuGrafico.destroy(); // Limpa o gráfico anterior se atualizar

            meuGrafico = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Focos de Calor',
                        data: valores,
                        backgroundColor: '#BCC1D6',
                        hoverBackgroundColor: '#A9ACC7',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function renderizarTabela(dados) {
            const tbody = document.getElementById('tabela-corpo');
            tbody.innerHTML = ''; 

            // Mostra apenas os 8 últimos na tabela para caber bem na tela dividida

            dados.forEach(linha => {
                let statusTexto = "Normal";
                let classeBadge = "badge-normal";

                if (linha.Alerta_Z === true) {
                    statusTexto = "Risco Extremo";
                    classeBadge = "badge-critico";
                } else if (linha.Alerta_IQR === true) {
                    statusTexto = "Atenção";
                    classeBadge = "badge-alerta";
                }

                const dataFormatada = new Date(linha.Data).toLocaleDateString('pt-BR', { timeZone: 'UTC' });

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${dataFormatada}</td>
                    <td><strong>${linha.Municipio}</strong></td>
                    <td><span class="badge ${classeBadge}">${statusTexto}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        carregarDados();
    </script>
</body>
</html>
